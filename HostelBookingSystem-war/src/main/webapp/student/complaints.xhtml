<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets">
<ui:composition template="/templates/layout.xhtml">
    <ui:define name="pageTitle">Complaints</ui:define>
    <ui:define name="content">
        <h:form id="complaintForm">
            <p:messages id="msgs" showDetail="true" closable="true"/>

            <!-- Submit Complaint -->
            <p:panel header="Submit New Complaint">
                <div class="field">
                    <p:outputLabel for="subject" value="Subject *"/>
                    <p:inputText id="subject" value="#{complaintBean.subject}"
                                 required="true" requiredMessage="Subject is required"
                                 styleClass="full-width" placeholder="Brief description of issue"/>
                    <p:message for="subject"/>
                </div>
                <div class="field">
                    <p:outputLabel for="desc" value="Description *"/>
                    <p:inputTextarea id="desc" value="#{complaintBean.description}"
                                     required="true" requiredMessage="Description is required"
                                     rows="5" styleClass="full-width"
                                     placeholder="Describe your complaint in detail"/>
                    <p:message for="desc"/>
                </div>
                <p:commandButton value="Submit Complaint" icon="fas fa-paper-plane"
                                 action="#{complaintBean.submitComplaint}"
                                 update="complaintForm" process="@form"/>
            </p:panel>

            <!-- My Complaints -->
            <p:panel header="My Complaints" style="margin-top:20px">
                <p:dataTable value="#{complaintBean.myComplaints}" var="c"
                             rows="10" paginator="true"
                             emptyMessage="You have not submitted any complaints.">
                    <p:column headerText="ID">
                        <h:outputText value="#{c.id}"/>
                    </p:column>
                    <p:column headerText="Subject">
                        <h:outputText value="#{c.subject}"/>
                    </p:column>
                    <p:column headerText="Status">
                        <p:tag value="#{c.status}"
                               severity="#{c.status == 'RESOLVED' or c.status == 'CLOSED' ? 'success' :
                                          c.status == 'OPEN' ? 'danger' : 'warning'}"/>
                    </p:column>
                    <p:column headerText="Submitted">
                        <h:outputText value="#{c.createdAt}">
                            <f:convertDateTime pattern="dd-MM-yyyy" type="localDateTime"/>
                        </h:outputText>
                    </p:column>
                    <p:column headerText="Admin Response">
                        <h:outputText value="#{c.adminResponse != null ? c.adminResponse : 'Pending review'}"/>
                    </p:column>
                </p:dataTable>
            </p:panel>
        </h:form>
    </ui:define>
</ui:composition>
</html>
