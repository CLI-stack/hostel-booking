<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets">
<ui:composition template="/templates/layout.xhtml">
    <ui:define name="pageTitle">Notifications</ui:define>
    <ui:define name="content">
        <h:form id="notifForm">
            <p:messages id="msgs" showDetail="true" closable="true"/>

            <p:panel header="Notifications">
                <f:facet name="actions">
                    <p:commandButton value="Mark All Read" icon="fas fa-check-double"
                                     action="#{notificationBean.markAllRead}"
                                     update="notifForm" styleClass="p-button-sm"/>
                </f:facet>

                <p:dataTable value="#{notificationBean.notifications}" var="n"
                             rows="15" paginator="true"
                             emptyMessage="No notifications.">
                    <p:column headerText="Title">
                        <h:outputText value="#{n.title}"
                                      style="#{!n.read ? 'font-weight:bold' : ''}"/>
                    </p:column>
                    <p:column headerText="Message">
                        <h:outputText value="#{n.message}"/>
                    </p:column>
                    <p:column headerText="Date">
                        <h:outputText value="#{n.sentAt}">
                            <f:convertDateTime pattern="dd-MM-yyyy HH:mm" type="localDateTime"/>
                        </h:outputText>
                    </p:column>
                    <p:column headerText="Status" style="width:100px">
                        <p:tag value="#{n.read ? 'Read' : 'Unread'}"
                               severity="#{n.read ? 'success' : 'warning'}"/>
                    </p:column>
                    <p:column style="width:80px">
                        <p:commandButton icon="fas fa-eye" title="Mark Read"
                                         action="#{notificationBean.markRead(n.id)}"
                                         update="notifForm"
                                         rendered="#{!n.read}"
                                         styleClass="p-button-sm p-button-text"/>
                    </p:column>
                </p:dataTable>
            </p:panel>
        </h:form>
    </ui:define>
</ui:composition>
</html>
