<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets">
<ui:composition template="/templates/layout.xhtml">
    <ui:define name="pageTitle">My Bookings</ui:define>
    <ui:define name="content">
        <h:form id="bookingForm">
            <p:messages id="msgs" showDetail="true" closable="true"/>

            <p:panel header="Registration Period Status">
                <p:tag value="OPEN - You may submit a booking"
                       severity="success" icon="fas fa-check-circle"
                       rendered="#{bookingBean.registrationOpen}"/>
                <p:tag value="CLOSED - Booking period is not open"
                       severity="danger" icon="fas fa-times-circle"
                       rendered="#{!bookingBean.registrationOpen}"/>
            </p:panel>

            <p:panel header="My Booking History" style="margin-top:20px">
                <p:dataTable id="bookingTable" value="#{bookingBean.myBookings}" var="b"
                             rows="10" paginator="true"
                             emptyMessage="You have no bookings yet. Browse rooms to make a booking.">

                    <p:column headerText="#" style="width:50px">
                        <h:outputText value="#{b.id}"/>
                    </p:column>

                    <p:column headerText="Room">
                        <h:outputText value="Room #{b.room.roomNumber} (#{b.room.type})"/>
                    </p:column>

                    <p:column headerText="Block">
                        <h:outputText value="Block #{b.room.block}"/>
                    </p:column>

                    <p:column headerText="Price/Semester">
                        <h:outputText value="RM #{b.room.pricePerSemester}"/>
                    </p:column>

                    <p:column headerText="Booking Date">
                        <h:outputText value="#{b.bookingDate}">
                            <f:convertDateTime pattern="dd-MM-yyyy HH:mm" type="localDateTime"/>
                        </h:outputText>
                    </p:column>

                    <p:column headerText="Booking Status">
                        <p:tag value="#{b.status.name()}"
                               styleClass="#{b.status.name() == 'PENDING' ? 'badge badge-pending' :
                                            b.status.name() == 'APPROVED' ? 'badge badge-booked' :
                                            b.status.name() == 'CHECKED_IN' ? 'badge badge-checkedin' :
                                            b.status.name() == 'REJECTED' ? 'badge badge-rejected' :
                                            b.status.name() == 'CANCELLED' ? 'badge badge-cancelled' :
                                            'badge badge-info'}"/>
                    </p:column>

                    <p:column headerText="Payment Status">
                        <!-- VERIFIED -->
                        <p:tag value="VERIFIED" severity="success" icon="fas fa-check-circle"
                               rendered="#{paymentBean.isPaymentVerifiedForBooking(b.id)}"/>
                        <!-- PENDING / FAILED -->
                        <h:panelGroup rendered="#{!paymentBean.isPaymentVerifiedForBooking(b.id) and
                                                   paymentBean.getPaymentForBooking(b.id).isPresent()}">
                            <p:tag value="#{paymentBean.getPaymentForBooking(b.id).get().status.name()}"
                                   severity="warning"/>
                        </h:panelGroup>
                        <!-- NOT PAID -->
                        <h:outputText value="NOT PAID"
                                      style="color:#dc2626; font-size:0.8rem; font-weight:600"
                                      rendered="#{!paymentBean.isPaymentVerifiedForBooking(b.id) and
                                                  !paymentBean.getPaymentForBooking(b.id).isPresent()}"/>
                    </p:column>

                    <p:column headerText="Action">
                        <!-- Cancel: only for PENDING bookings -->
                        <p:commandButton value="Cancel" icon="fas fa-times"
                                         styleClass="p-button-danger p-button-sm"
                                         rendered="#{b.status.name() == 'PENDING'}"
                                         action="#{bookingBean.cancelBooking(b.id)}"
                                         update="bookingForm"
                                         onclick="return confirm('Cancel this booking?')"/>

                        <!-- Make Payment: APPROVED + payment NOT yet verified -->
                        <p:button value="Make Payment" icon="fas fa-credit-card"
                                  styleClass="p-button-sm"
                                  outcome="/student/payment"
                                  rendered="#{b.status.name() == 'APPROVED' and !paymentBean.isPaymentVerifiedForBooking(b.id)}"/>

                        <!-- Payment Done: APPROVED + payment VERIFIED -->
                        <h:panelGroup rendered="#{b.status.name() == 'APPROVED' and paymentBean.isPaymentVerifiedForBooking(b.id)}">
                            <span style="color:#16a34a; font-weight:600; font-size:0.8rem">
                                <i class="fas fa-check-circle"></i>
                                Payment Done. Wait for Check-in.
                            </span>
                        </h:panelGroup>

                        <!-- Checked In: staff completed check-in -->
                        <h:panelGroup rendered="#{b.status.name() == 'CHECKED_IN'}">
                            <span style="color:#2563eb; font-weight:600; font-size:0.8rem">
                                <i class="fas fa-sign-in-alt"></i>
                                Checked In
                            </span>
                        </h:panelGroup>

                        <!-- Checked Out -->
                        <h:panelGroup rendered="#{b.status.name() == 'CHECKED_OUT'}">
                            <span style="color:#64748b; font-size:0.8rem">
                                <i class="fas fa-sign-out-alt"></i>
                                Checked Out
                            </span>
                        </h:panelGroup>
                    </p:column>
                </p:dataTable>
            </p:panel>
        </h:form>
    </ui:define>
</ui:composition>
</html>
