<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets">
<ui:composition template="/templates/layout.xhtml">
    <ui:define name="pageTitle">Payment</ui:define>
    <ui:define name="content">
        <h:form id="paymentForm">
            <p:messages id="msgs" showDetail="true" closable="true"/>

            <p:panel header="Make Payment">
                <p:panel header="Step 1: Select Approved Booking" styleClass="step-panel">
                    <p:dataTable value="#{paymentBean.approvedBookings}" var="b"
                                 emptyMessage="No approved bookings pending payment.">
                        <p:column headerText="Room">
                            <h:outputText value="Room #{b.room.roomNumber} (#{b.room.type})"/>
                        </p:column>
                        <p:column headerText="Amount">
                            <h:outputText value="RM #{b.room.pricePerSemester}"/>
                        </p:column>
                        <p:column headerText="Action">
                            <p:commandButton value="Select" icon="fas fa-check"
                                             styleClass="p-button-success p-button-sm"
                                             update="paymentForm"
                                             process="@form">
                                <f:setPropertyActionListener target="#{paymentBean.selectedBookingId}" value="#{b.id}"/>
                            </p:commandButton>
                        </p:column>
                    </p:dataTable>
                </p:panel>

                <p:panel header="Step 2: Choose Payment Method" styleClass="step-panel"
                         rendered="#{paymentBean.selectedBookingId != null}">
                    <div class="field">
                        <p:outputLabel for="method" value="Payment Method:"/>
                        <p:selectOneMenu id="method" value="#{paymentBean.paymentMethod}" style="width:200px">
                            <f:selectItem itemLabel="FPX (Online Banking)" itemValue="FPX"/>
                            <f:selectItem itemLabel="Credit Card" itemValue="CREDIT_CARD"/>
                            <f:selectItem itemLabel="Debit Card" itemValue="DEBIT_CARD"/>
                        </p:selectOneMenu>
                    </div>
                    <p:commandButton value="Initiate Payment" icon="fas fa-paper-plane"
                                     action="#{paymentBean.initiatePayment}"
                                     update="paymentForm" process="@form"/>
                </p:panel>

                <p:panel header="Step 3: Verify Payment" styleClass="step-panel"
                         rendered="#{paymentBean.currentPayment != null}">
                    <p:panelGrid columns="2" styleClass="details-grid">
                        <h:outputLabel value="Transaction ID:"/>
                        <h:outputText value="#{paymentBean.currentPayment.transactionId}" styleClass="mono"/>
                        <h:outputLabel value="Amount:"/>
                        <h:outputText value="RM #{paymentBean.currentPayment.amount}"/>
                        <h:outputLabel value="Method:"/>
                        <h:outputText value="#{paymentBean.currentPayment.paymentMethod}"/>
                        <h:outputLabel value="Status:"/>
                        <p:tag value="#{paymentBean.currentPayment.status}"
                               severity="#{paymentBean.currentPayment.status == 'VERIFIED' ? 'success' :
                                          paymentBean.currentPayment.status == 'FAILED' ? 'danger' : 'warning'}"/>
                    </p:panelGrid>
                    <p:commandButton value="Verify Payment (via Web Service)" icon="fas fa-shield-alt"
                                     action="#{paymentBean.verifyPayment(paymentBean.currentPayment.id)}"
                                     update="paymentForm"
                                     rendered="#{paymentBean.currentPayment.status == 'PENDING'}"
                                     styleClass="p-button-success"/>
                </p:panel>
            </p:panel>
        </h:form>
    </ui:define>
</ui:composition>
</html>
