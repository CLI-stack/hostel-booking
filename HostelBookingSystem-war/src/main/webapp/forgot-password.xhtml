<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="http://xmlns.jcp.org/jsf/core">
<h:head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Forgot Password - Hostel Room Booking System</title>
    <h:outputStylesheet library="css" name="styles.css"/>
</h:head>
<h:body styleClass="login-page">
    <div class="login-container">
        <div class="login-card" style="max-width:420px">
            <div class="login-header">
                <i class="fas fa-lock-open login-icon"></i>
                <h2>Reset Password</h2>
                <p>Hostel Room Booking System</p>
            </div>

            <h:form id="forgotForm">
                <p:messages id="msgs" showDetail="true" closable="true"/>

                <!-- Step 1: Enter email -->
                <h:panelGroup rendered="#{!forgotPasswordBean.emailVerified}">
                    <div class="field">
                        <p:outputLabel for="email" value="Registered Email Address"/>
                        <p:inputText id="email" value="#{forgotPasswordBean.email}"
                                     required="true" requiredMessage="Email is required"
                                     styleClass="full-width" placeholder="Enter your email"/>
                        <p:message for="email"/>
                    </div>
                    <p:commandButton value="Verify Email" icon="fas fa-search"
                                     action="#{forgotPasswordBean.verifyEmail}"
                                     update="forgotForm" styleClass="login-btn full-width"/>
                </h:panelGroup>

                <!-- Step 2: Set new password -->
                <h:panelGroup rendered="#{forgotPasswordBean.emailVerified}">
                    <div class="field">
                        <p:outputLabel for="newPwd" value="New Password"/>
                        <p:password id="newPwd" value="#{forgotPasswordBean.newPassword}"
                                    required="true" toggleMask="true" feedback="true"
                                    styleClass="full-width" placeholder="Min 6 characters"/>
                        <p:message for="newPwd"/>
                    </div>
                    <div class="field">
                        <p:outputLabel for="confirmPwd" value="Confirm New Password"/>
                        <p:password id="confirmPwd" value="#{forgotPasswordBean.confirmPassword}"
                                    required="true" toggleMask="true" feedback="false"
                                    styleClass="full-width" placeholder="Repeat new password"/>
                        <p:message for="confirmPwd"/>
                    </div>
                    <p:commandButton value="Reset Password" icon="fas fa-key"
                                     action="#{forgotPasswordBean.resetPassword}"
                                     update="forgotForm" styleClass="login-btn full-width"/>
                </h:panelGroup>

                <div class="login-footer">
                    <p><h:link value="Back to Login" outcome="login"/></p>
                </div>
            </h:form>
        </div>
    </div>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
</h:body>
</html>
