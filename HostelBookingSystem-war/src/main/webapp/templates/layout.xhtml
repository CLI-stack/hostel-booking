<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:p="http://primefaces.org/ui"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets">
<h:head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Hostel Room Booking System - <ui:insert name="pageTitle">Page</ui:insert></title>
    <h:outputStylesheet library="css" name="styles.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
</h:head>
<h:body>
    <!-- Global loading indicator -->
    <p:ajaxStatus>
        <f:facet name="start">
            <div class="global-loading">
                <i class="fas fa-spinner fa-spin"></i> Loading...
            </div>
        </f:facet>
        <f:facet name="complete">
            <div class="global-loading" style="display:none"></div>
        </f:facet>
    </p:ajaxStatus>

    <div class="layout-wrapper">

        <!-- Top Navigation -->
        <div class="topbar">
            <div class="topbar-left">
                <a href="#" class="menu-toggle" onclick="toggleSidebar(); return false;">
                    <i class="fas fa-bars"></i>
                    <span>Menu</span>
                </a>
                <i class="fas fa-building"></i>
                <span class="system-title">Hostel Room Booking System</span>
            </div>
            <div class="topbar-right">
                <h:form id="topbarForm" rendered="#{sessionBean.loggedIn}">
                    <span class="user-info">
                        <i class="fas fa-user-circle"></i>
                        #{sessionBean.loggedInUser.fullName}
                        <span class="role-badge">#{sessionBean.loggedInUser.role}</span>
                    </span>
                    <p:commandButton value="Logout" icon="fas fa-sign-out-alt"
                                     action="#{loginBean.logout}"
                                     styleClass="logout-btn"/>
                </h:form>
            </div>
        </div>

        <!-- Sidebar + Content -->
        <div class="layout-container">
            <div id="appSidebar" class="sidebar-rail" rendered="#{sessionBean.loggedIn}">

                <!-- Student Rail -->
                <ui:fragment rendered="#{sessionBean.student}">
                    <a class="rail-icon" href="#{request.contextPath}/student/dashboard.xhtml" data-label="Dashboard">
                        <i class="fas fa-tachometer-alt"></i>
                    </a>
                    <a class="rail-icon" href="#{request.contextPath}/student/rooms.xhtml" data-label="Browse Rooms">
                        <i class="fas fa-door-open"></i>
                    </a>
                    <a class="rail-icon" href="#{request.contextPath}/student/my-bookings.xhtml" data-label="My Bookings">
                        <i class="fas fa-calendar-check"></i>
                    </a>
                    <a class="rail-icon" href="#{request.contextPath}/student/payment.xhtml" data-label="Payment">
                        <i class="fas fa-credit-card"></i>
                    </a>
                    <a class="rail-icon" href="#{request.contextPath}/student/complaints.xhtml" data-label="Complaints">
                        <i class="fas fa-comment-dots"></i>
                    </a>
                    <a class="rail-icon" href="#{request.contextPath}/student/notifications.xhtml" data-label="Notifications">
                        <i class="fas fa-bell"></i>
                    </a>
                    <a class="rail-icon" href="#{request.contextPath}/profile.xhtml" data-label="Edit Profile">
                        <i class="fas fa-user-edit"></i>
                    </a>
                </ui:fragment>

                <!-- Staff Rail -->
                <ui:fragment rendered="#{sessionBean.staff}">
                    <a class="rail-icon" href="#{request.contextPath}/staff/dashboard.xhtml" data-label="Dashboard">
                        <i class="fas fa-tachometer-alt"></i>
                    </a>
                    <a class="rail-icon" href="#{request.contextPath}/staff/bookings.xhtml" data-label="Manage Bookings">
                        <i class="fas fa-clipboard-list"></i>
                    </a>
                    <a class="rail-icon" href="#{request.contextPath}/staff/checkinout.xhtml" data-label="Check In/Out">
                        <i class="fas fa-exchange-alt"></i>
                    </a>
                    <a class="rail-icon" href="#{request.contextPath}/staff/maintenance.xhtml" data-label="Maintenance">
                        <i class="fas fa-tools"></i>
                    </a>
                    <a class="rail-icon" href="#{request.contextPath}/profile.xhtml" data-label="Edit Profile">
                        <i class="fas fa-user-edit"></i>
                    </a>
                </ui:fragment>

                <!-- Admin Rail -->
                <ui:fragment rendered="#{sessionBean.admin}">
                    <a class="rail-icon" href="#{request.contextPath}/admin/dashboard.xhtml" data-label="Dashboard">
                        <i class="fas fa-tachometer-alt"></i>
                    </a>
                    <a class="rail-icon" href="#{request.contextPath}/admin/rooms.xhtml" data-label="Manage Rooms">
                        <i class="fas fa-bed"></i>
                    </a>
                    <a class="rail-icon" href="#{request.contextPath}/admin/bookings.xhtml" data-label="All Bookings">
                        <i class="fas fa-clipboard-list"></i>
                    </a>
                    <a class="rail-icon" href="#{request.contextPath}/admin/complaints.xhtml" data-label="Complaints">
                        <i class="fas fa-comment-alt"></i>
                    </a>
                    <a class="rail-icon" href="#{request.contextPath}/admin/reports.xhtml" data-label="Reports">
                        <i class="fas fa-chart-bar"></i>
                    </a>
                    <a class="rail-icon" href="#{request.contextPath}/admin/registration-periods.xhtml" data-label="Registration Periods">
                        <i class="fas fa-calendar-alt"></i>
                    </a>
                    <a class="rail-icon" href="#{request.contextPath}/admin/users.xhtml" data-label="User Management">
                        <i class="fas fa-users-cog"></i>
                    </a>
                    <a class="rail-icon" href="#{request.contextPath}/profile.xhtml" data-label="Edit Profile">
                        <i class="fas fa-user-edit"></i>
                    </a>
                </ui:fragment>
            </div>

            <!-- Backdrop for mobile sidebar overlay -->
            <div id="sidebarBackdrop" class="sidebar-backdrop" onclick="toggleSidebar();"></div>

            <!-- Main Content -->
            <div class="main-content">
                <p:growl id="growl" life="4000" showDetail="true" sticky="false"/>
                <h1 class="page-title"><ui:insert name="pageTitle">Page</ui:insert></h1>
                <ui:insert name="content">Content goes here</ui:insert>
            </div>
        </div>
    </div>

    <script type="text/javascript">
        function toggleSidebar() {
            var sidebar = document.getElementById('appSidebar');
            var backdrop = document.getElementById('sidebarBackdrop');
            if (sidebar) { sidebar.classList.toggle('sidebar-open'); }
            if (backdrop) { backdrop.classList.toggle('sidebar-open'); }
        }
    </script>
</h:body>
</html>
