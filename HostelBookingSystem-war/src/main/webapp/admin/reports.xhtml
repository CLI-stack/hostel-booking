<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets">
<ui:composition template="/templates/layout.xhtml">
    <ui:define name="pageTitle">Reports &amp; Analytics</ui:define>
    <ui:define name="content">
        <h:form>
            <!-- Download Button -->
            <div style="text-align:right; margin-bottom:16px;">
                <p:commandButton value="Download Report (PDF)" icon="fas fa-download"
                                 ajax="false" styleClass="p-button-success">
                    <p:fileDownload value="#{adminReportBean.exportReportPdf()}"/>
                </p:commandButton>
            </div>

            <!-- Summary KPIs -->
            <div class="stats-row">
                <div class="stat-card">
                    <i class="fas fa-bed stat-icon blue"></i>
                    <div class="stat-info">
                        <span class="stat-number">#{adminReportBean.totalRooms}</span>
                        <span class="stat-label">Total Rooms</span>
                    </div>
                </div>
                <div class="stat-card">
                    <i class="fas fa-calendar-check stat-icon green"></i>
                    <div class="stat-info">
                        <span class="stat-number">#{adminReportBean.totalBookings}</span>
                        <span class="stat-label">Total Bookings</span>
                    </div>
                </div>
                <div class="stat-card">
                    <i class="fas fa-money-bill-wave stat-icon orange"></i>
                    <div class="stat-info">
                        <span class="stat-number">RM #{adminReportBean.totalRevenue}</span>
                        <span class="stat-label">Total Revenue</span>
                    </div>
                </div>
            </div>
            <!-- Booking Status Summary -->
            <p:panel header="Booking Status Summary" style="margin-top:20px">
                <p:dataTable value="#{adminReportBean.bookingStatusSummary.entrySet().toArray()}" var="entry">
                    <p:column headerText="Status">
                        <h:outputText value="#{entry.key}"/>
                    </p:column>
                    <p:column headerText="Count">
                        <h:outputText value="#{entry.value}"/>
                    </p:column>
                </p:dataTable>
            </p:panel>
            <!-- Room Status Summary -->
            <p:panel header="Room Availability Summary" style="margin-top:20px">
                <p:dataTable value="#{adminReportBean.roomStatusSummary.entrySet().toArray()}" var="entry">
                    <p:column headerText="Status">
                        <h:outputText value="#{entry.key}"/>
                    </p:column>
                    <p:column headerText="Count">
                        <h:outputText value="#{entry.value}"/>
                    </p:column>
                </p:dataTable>
            </p:panel>
            <!-- Occupancy Rate -->
            <p:panel header="Occupancy Rate" style="margin-top:20px">
                <p:progressBar value="#{adminReportBean.occupancyRate}"
                               displayOnly="true"
                               style="height:30px; margin-bottom:10px"/>
                <p:panelGrid columns="2" styleClass="details-grid">
                    <h:outputLabel value="Occupancy Rate:"/>
                    <h:outputText value="#{adminReportBean.occupancyRate}%">
                        <f:convertNumber maxFractionDigits="1"/>
                    </h:outputText>
                    <h:outputLabel value="Pending Bookings:"/>
                    <h:outputText value="#{adminReportBean.pendingBookings}"/>
                    <h:outputLabel value="Total Revenue:"/>
                    <h:outputText value="RM #{adminReportBean.totalRevenue}"/>
                </p:panelGrid>
            </p:panel>
        </h:form>
    </ui:define>
</ui:composition>
</html>
