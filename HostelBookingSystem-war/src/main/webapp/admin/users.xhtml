<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets">
<ui:composition template="/templates/layout.xhtml">
    <ui:define name="pageTitle">User Management</ui:define>
    <ui:define name="content">
        <h:form id="userForm">
            <p:messages id="msgs" showDetail="true" closable="true"/>

            <p:panel header="Create New User Account" toggleable="true">
                <p:panelGrid columns="2" styleClass="form-grid">
                    <p:outputLabel for="role" value="Role *"/>
                    <p:selectOneMenu id="role" value="#{registerBean.selectedRole}"
                                     required="true" style="width:200px"
                                     onchange="updateEmailHint()">
                        <f:selectItem itemLabel="Student" itemValue="STUDENT"/>
                        <f:selectItem itemLabel="Staff"   itemValue="STAFF"/>
                        <f:selectItem itemLabel="Admin"   itemValue="ADMIN"/>
                    </p:selectOneMenu>

                    <p:outputLabel for="fullName" value="Full Name *"/>
                    <p:inputText id="fullName" value="#{registerBean.fullName}"
                                 required="true" styleClass="full-width"
                                 placeholder="Full name"/>

                    <p:outputLabel for="email" value="Email *"/>
                    <p:inputText id="email" value="#{registerBean.email}"
                                 required="true" styleClass="full-width"
                                 placeholder="Must match role domain"/>

                    <p:outputLabel value="Email Domain Rules"/>
                    <div class="domain-hints">
                        <small>Student: @student.upm.edu.my</small><br/>
                        <small>Staff: @staff.upm.edu.my</small><br/>
                        <small>Admin: @admin.upm.edu.my</small>
                    </div>

                    <p:outputLabel for="username" value="Username *"/>
                    <p:inputText id="username" value="#{registerBean.username}"
                                 required="true" styleClass="full-width"/>

                    <p:outputLabel for="phone" value="Phone"/>
                    <p:inputText id="phone" value="#{registerBean.phone}"
                                 styleClass="full-width" placeholder="01x-xxxxxxxx"/>

                    <p:outputLabel for="matric" value="Matric No."/>
                    <p:inputText id="matric" value="#{registerBean.matricNumber}"
                                 styleClass="full-width" placeholder="For students only"/>

                    <p:outputLabel for="pwd" value="Password *"/>
                    <p:password id="pwd" value="#{registerBean.password}"
                                required="true" toggleMask="true" feedback="true"
                                styleClass="full-width"/>

                    <p:outputLabel for="confirmPwd" value="Confirm Password *"/>
                    <p:password id="confirmPwd" value="#{registerBean.confirmPassword}"
                                required="true" toggleMask="true" feedback="false"
                                styleClass="full-width"/>
                </p:panelGrid>

                <p:commandButton value="Create User" icon="fas fa-user-plus"
                                 action="#{registerBean.adminCreateUser}"
                                 update="userForm userListForm"
                                 process="userForm"
                                 styleClass="p-button-success"
                                 style="margin-top:12px"/>
            </p:panel>
        </h:form>

        <!-- Existing Users List -->
        <h:form id="userListForm" style="margin-top:20px">
            <p:panel header="All System Users">
                <p:dataTable value="#{adminUserListBean.allUsers}" var="u"
                             rows="10" paginator="true" filterable="true"
                             emptyMessage="No users found.">
                    <p:column headerText="Full Name" filterBy="#{u.fullName}">
                        <h:outputText value="#{u.fullName}"/>
                    </p:column>
                    <p:column headerText="Username" filterBy="#{u.username}">
                        <h:outputText value="#{u.username}"/>
                    </p:column>
                    <p:column headerText="Email">
                        <h:outputText value="#{u.email}"/>
                    </p:column>
                    <p:column headerText="Role">
                        <p:tag value="#{u.role}"
                               severity="#{u.role == 'ADMIN' ? 'danger' :
                                          u.role == 'STAFF' ? 'warning' : 'info'}"/>
                    </p:column>
                    <p:column headerText="Status">
                        <p:tag value="#{u.active ? 'ACTIVE' : 'INACTIVE'}"
                               severity="#{u.active ? 'success' : 'danger'}"/>
                    </p:column>
                </p:dataTable>
            </p:panel>
        </h:form>
    </ui:define>
</ui:composition>
</html>
