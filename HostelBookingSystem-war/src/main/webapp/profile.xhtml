<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets">
<ui:composition template="/templates/layout.xhtml">
    <ui:define name="pageTitle">Edit Profile</ui:define>
    <ui:define name="content">

        <style>
            .ui-outputlabel-rfi {
                color: #dc3545;
                font-weight: bold;
                margin-left: 2px;
            }
        </style>

        <!-- Update Personal Info -->
        <h:form id="profileForm">
            <p:messages id="profileMsgs" showDetail="true" closable="true"/>
            <p:panel header="Personal Information">
                <p:panelGrid columns="2" styleClass="form-grid">
                    <p:outputLabel for="fullName" value="Full Name"/>
                    <p:inputText id="fullName" value="#{profileBean.fullName}"
                                 required="true" styleClass="full-width"/>
                    <p:outputLabel for="email" value="Email Address"/>
                    <p:inputText id="email" value="#{profileBean.email}"
                                 required="true" styleClass="full-width"/>
                    <p:outputLabel for="phone" value="Phone Number"/>
                    <p:inputText id="phone" value="#{profileBean.phone}"
                                 styleClass="full-width" placeholder="e.g. 01x-xxxxxxxx"/>
                    <p:outputLabel value="Role"/>
                    <h:outputText value="#{sessionBean.loggedInUser.role}"
                                  style="font-weight:bold; color:var(--primary)"/>
                    <p:outputLabel value="Username"/>
                    <h:outputText value="#{sessionBean.loggedInUser.username}"
                                  style="color:#64748b"/>
                </p:panelGrid>
                <p:commandButton value="Save Changes" icon="fas fa-save"
                                 action="#{profileBean.updateProfile}"
                                 update="profileForm" styleClass="p-button-success"
                                 style="margin-top:16px"/>
            </p:panel>
        </h:form>
        <!-- Change Password -->
        <h:form id="pwdForm" style="margin-top:24px">
            <p:messages id="pwdMsgs" showDetail="true" closable="true"/>
            <p:panel header="Change Password">
                <p:panelGrid columns="2" styleClass="form-grid">
                    <p:outputLabel for="currentPwd" value="Current Password"/>
                    <p:password id="currentPwd" value="#{profileBean.currentPassword}"
                                required="true" toggleMask="true" feedback="false"
                                styleClass="full-width"/>
                    <p:outputLabel for="newPwd" value="New Password"/>
                    <p:password id="newPwd" value="#{profileBean.newPassword}"
                                required="true" toggleMask="true" feedback="true"
                                styleClass="full-width" placeholder="Min 6 characters"/>
                    <p:outputLabel for="confirmPwd" value="Confirm New Password"/>
                    <p:password id="confirmPwd" value="#{profileBean.confirmNewPassword}"
                                required="true" toggleMask="true" feedback="false"
                                styleClass="full-width"/>
                </p:panelGrid>
                <p:commandButton value="Change Password" icon="fas fa-key"
                                 action="#{profileBean.changePassword}"
                                 update="pwdForm" styleClass="p-button-warning"
                                 style="margin-top:16px"/>
            </p:panel>
        </h:form>
    </ui:define>
</ui:composition>
</html>
