<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets">
<ui:composition template="/templates/layout.xhtml">
    <ui:define name="pageTitle">Check In / Check Out</ui:define>
    <ui:define name="content">
        <h:form id="checkForm">
            <p:messages id="msgs" showDetail="true" closable="true"/>

            <!-- Currently Checked In -->
            <p:panel header="Currently Checked In Students">
                <p:dataTable value="#{staffBookingBean.checkedInRecords}" var="c"
                             emptyMessage="No students currently checked in.">
                    <p:column headerText="Student">
                        <h:outputText value="#{c.booking.student.fullName}"/>
                    </p:column>
                    <p:column headerText="Room">
                        <h:outputText value="#{c.booking.room.roomNumber}"/>
                    </p:column>
                    <p:column headerText="Check In Time">
                        <h:outputText value="#{c.checkInDate}">
                            <f:convertDateTime pattern="dd-MM-yyyy HH:mm" type="localDateTime"/>
                        </h:outputText>
                    </p:column>
                    <p:column headerText="Action">
                        <p:commandButton value="Check Out" icon="fas fa-sign-out-alt"
                                         styleClass="p-button-warning p-button-sm"
                                         oncomplete="PF('checkOutDialog').show()"
                                         update="checkForm">
                            <f:setPropertyActionListener
                                target="#{staffBookingBean.selectedBooking}" value="#{c.booking}"/>
                        </p:commandButton>
                    </p:column>
                </p:dataTable>
            </p:panel>

            <!-- Approved Bookings — Pending Check In (with Payment Status) -->
            <p:panel header="Approved Bookings — Pending Check In" style="margin-top:20px">
                <p:dataTable value="#{staffBookingBean.pendingCheckInBookings}" var="b"
                             rows="10" paginator="true"
                             emptyMessage="No approved bookings pending check-in.">

                    <p:column headerText="Student">
                        <h:outputText value="#{b.student.fullName}"/>
                        <br/>
                        <small style="color:#64748b">
                            <h:outputText value="#{b.student.matricNumber}"/>
                        </small>
                    </p:column>

                    <p:column headerText="Room">
                        <h:outputText value="#{b.room.roomNumber} | Block #{b.room.block}"/>
                        <br/>
                        <small style="color:#64748b">
                            RM <h:outputText value="#{b.room.pricePerSemester}"/>
                        </small>
                    </p:column>

                    <p:column headerText="Booking Status">
                        <span class="badge badge-booked">APPROVED</span>
                    </p:column>

                    <!-- Payment Status column — critical for check-in enforcement -->
                    <p:column headerText="Payment Status">
                        <h:panelGroup>
                            <!-- VERIFIED — green, check-in allowed -->
                            <p:tag value="VERIFIED" severity="success"
                                   icon="fas fa-check-circle"
                                   rendered="#{staffBookingBean.isPaymentVerified(b.id)}"/>
                            <!-- NOT PAID / PENDING / FAILED — red, blocks check-in -->
                            <h:panelGroup rendered="#{!staffBookingBean.isPaymentVerified(b.id)}">
                                <p:tag value="#{staffBookingBean.getPaymentStatusLabel(b.id)}"
                                       severity="danger"
                                       icon="fas fa-times-circle"/>
                                <div style="font-size:0.75rem; color:#dc2626; margin-top:4px">
                                    <i class="fas fa-lock"></i>
                                    Check-in blocked until payment verified
                                </div>
                            </h:panelGroup>
                        </h:panelGroup>
                    </p:column>

                    <p:column headerText="Action">
                        <!-- Check In button — ENABLED only if payment is VERIFIED -->
                        <p:commandButton value="Check In" icon="fas fa-sign-in-alt"
                                         styleClass="p-button-success p-button-sm"
                                         rendered="#{staffBookingBean.isPaymentVerified(b.id)}"
                                         oncomplete="PF('checkInDialog').show()"
                                         update="checkForm">
                            <f:setPropertyActionListener
                                target="#{staffBookingBean.selectedBooking}" value="#{b}"/>
                        </p:commandButton>

                        <!-- Blocked indicator — shown when payment is NOT verified -->
                        <p:commandButton value="Cannot Check In" icon="fas fa-lock"
                                         styleClass="p-button-danger p-button-sm"
                                         rendered="#{!staffBookingBean.isPaymentVerified(b.id)}"
                                         disabled="true"
                                         title="Payment must be verified before check-in"/>
                    </p:column>
                </p:dataTable>
            </p:panel>

            <!-- Check In Dialog -->
            <p:dialog widgetVar="checkInDialog" header="Check In Student"
                      modal="true" resizable="false" width="450">
                <p:messages showDetail="true"/>
                <div class="field">
                    <p:outputLabel value="Room Condition:"/>
                    <p:inputText value="#{staffBookingBean.roomCondition}"
                                 placeholder="e.g. Good condition" styleClass="full-width"/>
                </div>
                <div class="field">
                    <p:outputLabel value="Notes:"/>
                    <p:inputTextarea value="#{staffBookingBean.notes}"
                                     rows="3" styleClass="full-width"/>
                </div>
                <p:commandButton value="Confirm Check In" icon="fas fa-check"
                                 styleClass="p-button-success"
                                 action="#{staffBookingBean.checkIn(staffBookingBean.selectedBooking.id)}"
                                 update="checkForm"
                                 oncomplete="if(!args.validationFailed) PF('checkInDialog').hide()"/>
                <p:commandButton value="Cancel" icon="fas fa-times"
                                 styleClass="p-button-secondary" style="margin-left:8px"
                                 onclick="PF('checkInDialog').hide(); return false;"
                                 type="button"/>
            </p:dialog>

            <!-- Check Out Dialog -->
            <p:dialog widgetVar="checkOutDialog" header="Check Out Student"
                      modal="true" resizable="false" width="450">
                <div class="field">
                    <p:outputLabel value="Room Condition on Checkout:"/>
                    <p:inputText value="#{staffBookingBean.roomCondition}"
                                 placeholder="e.g. Good / Damaged" styleClass="full-width"/>
                </div>
                <div class="field">
                    <p:outputLabel value="Notes:"/>
                    <p:inputTextarea value="#{staffBookingBean.notes}"
                                     rows="3" styleClass="full-width"/>
                </div>
                <p:commandButton value="Confirm Check Out" icon="fas fa-check"
                                 styleClass="p-button-warning"
                                 action="#{staffBookingBean.checkOut(staffBookingBean.selectedBooking.id)}"
                                 update="checkForm"
                                 oncomplete="if(!args.validationFailed) PF('checkOutDialog').hide()"/>
                <p:commandButton value="Cancel" icon="fas fa-times"
                                 styleClass="p-button-secondary" style="margin-left:8px"
                                 onclick="PF('checkOutDialog').hide(); return false;"
                                 type="button"/>
            </p:dialog>
        </h:form>
    </ui:define>
</ui:composition>
</html>
